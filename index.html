<script>
  const API_BASE_URL = "https://script.google.com/macros/s/AKfycbyzQWyW6couGng8xQa3P2AXnRr0RBJrntOEfhJMzAjKkLVbPhXvYGkr_zoSL5xh2_xt/exec";

// =========================
// GET API
// =========================
function apiGet(api, params = {}) {

  const query = new URLSearchParams({
    api: api,
    ...params
  }).toString();

  return fetch(API_BASE_URL + "?" + query)
    .then(res => res.json())
    .catch(err => {
      console.error("GET API Error:", err);
      throw err;
    });
}


// =========================
// POST API
// =========================
function apiPost(api, body = {}) {
  return fetch(API_BASE_URL + "?api=" + api, {
    method: "POST",
    body: JSON.stringify(body)
  })
  .then(res => res.json());
}

</script>

  <script>

function loadCouponStatus() {
  const box = document.getElementById("couponStatusTable");
  if (!box) return;

  box.innerHTML = "Loading pending coupon payments...";

  // 🔹 helper: number formatting (comma)
  const fmt = n => Number(n || 0).toLocaleString("en-IN");

  /* 🔴 REMOVE THIS OLD BLOCK COMPLETELY

  google.script.run
    .withSuccessHandler(function (rows) {
      ...
    })
    .withFailureHandler(function (err) {
      ...
    })
    .getPendingPrepaidCoupons();

  🔴 END REMOVE
  */

  // 🟢 NEW API VERSION START
  apiGet("getPendingPrepaidCoupons")
    .then(function (rows) {

      console.log("UI RECEIVED COUPONS:", rows);

      if (!rows || rows.length === 0) {
        box.innerHTML = "<p>No pending coupon payments 🎉</p>";
        return;
      }

      let html = `
        <table border="1" cellpadding="6" cellspacing="0"
               style="width:100%; border-collapse:collapse;">
          <tr style="background:#f0f0f0">
            <th>Time</th>
            <th>Order Group</th>
            <th>Mobile</th>
            <th>Package</th>
            <th>Slab</th>
            <th style="text-align:right;">Coupon Amt</th>
            <th style="text-align:right;">Discount %</th>
            <th style="text-align:right;">Discount Amt</th>
            <th style="text-align:right;">Net Rate</th>
            <th style="text-align:right;">Qty</th>
            <th style="text-align:right;">Net Amt</th>
            <th>Status</th>
          </tr>
      `;

      // 🔹 STEP-1: group by mobile
      const grouped = {};
      rows.forEach(r => {
        if (!grouped[r.mobile]) grouped[r.mobile] = [];
        grouped[r.mobile].push(r);
      });

      // 🔹 STEP-2: render groups
      let grandTotal = 0;

      Object.keys(grouped).forEach(mobile => {
        let mobileTotal = 0;

        grouped[mobile].forEach(r => {
          const netAmt = Number(r.net_amount || 0);
          mobileTotal += netAmt;

          html += `
            <tr>
              <td>${r.timestamp}</td>
              <td>${r.order_group_id}</td>
              <td>${r.mobile}</td>
              <td>${r.package_id}</td>
              <td>${r.slab_id}</td>
              <td style="text-align:right;">${fmt(r.buy_amount)}</td>
              <td style="text-align:right;">${fmt(r.discount_percent)}</td>
              <td style="text-align:right;">${fmt(r.discount_amount)}</td>
              <td style="text-align:right;">${fmt(r.net_rate)}</td>
              <td style="text-align:right;">${fmt(r.qty)}</td>
              <td style="text-align:right;"><b>${fmt(netAmt)}</b></td>
              <td>${renderStatusCell(r)}</td>
            </tr>
          `;
        });

        grandTotal += mobileTotal;

        // 🔹 Mobile subtotal
        html += `
          <tr style="background:#fff3cd; font-weight:bold;">
            <td colspan="10">Total of (Mobile ${mobile})</td>
            <td style="text-align:right;">${fmt(mobileTotal)}</td>
            <td></td>
          </tr>
        `;
      });

      // 🔹 Grand total
      html += `
        <tr style="background:#d1ecf1; font-weight:bold; font-size:15px;">
          <td colspan="10">GRAND TOTAL</td>
          <td style="text-align:right;">${fmt(grandTotal)}</td>
          <td></td>
        </tr>
      `;

      html += "</table>";
      box.innerHTML = html;
    })
    .catch(function (err) {
      console.error("Coupon status load failed", err);
      box.innerHTML =
        "<p style='color:red'>Failed to load coupon status</p>";
    });
  // 🟢 NEW API VERSION END
}

function renderStatusCell(r) {
  if (r.payment_status !== "pending") {
    return `<b>${r.payment_status}</b>`;
  }

  return `
    <div style="display:flex; gap:6px; flex-wrap:wrap;">
      <button
        data-row="${r._row}"
        style="padding:2px 6px; font-size:12px; background:#28a745; color:#fff; border:none; border-radius:4px;"
        onclick="handleCouponAction('received', this)">
        Received
      </button>

      <button
        data-row="${r._row}"
        style="padding:2px 6px; font-size:12px; background:#dc3545; color:#fff; border:none; border-radius:4px;"
        onclick="handleCouponAction('cancelled', this)">
        Cancel
      </button>
    </div>
  `;
}

  if (!row || row < 2) {
    alert("Invalid row");
    return;
  }

  const cell = btn.closest("td");
  cell.innerHTML = "Processing...";
  // 🔥 instant feedback (optimistic UI)
if (action === "cancelled") {
  cell.innerHTML = "<b style='color:#dc3545'>Cancelled</b>";
}
if (action === "received") {
  cell.innerHTML = "<b style='color:#28a745'>Received</b>";
}
  btn.disabled = true;

  google.script.run

    })

    })

    });
}



 function loadOrders() {

  if (!document.querySelector('.nav-btn[data-page="pageOrders"]').classList.contains('active')) return;

  const placeholder = document.getElementById('ordersPlaceholder');
  const lastUpdatedDiv = document.getElementById('lastUpdated');

  if (placeholder) placeholder.textContent = 'Loading...';

  // 🔥 READ DATE INPUTS
  const fromDate = document.getElementById("fromDate")?.value;
  const toDate = document.getElementById("toDate")?.value;

  // 🔥 VALIDATION
  if (!fromDate || !toDate) {
    placeholder.textContent = "Please select date range.";
    return;
  }

  // 🔥 SEND FILTER TO BACKEND
  apiGet("getOrderNumbers", {
    fromDate: fromDate,
    toDate: toDate
  })
  .then(function(data){

    if (!placeholder) return;

    if (!data || data.length === 0) {
      placeholder.textContent = "No orders found.";
      return;
    }

    let html = `
      <table>
        <tr>
          <th>Order No</th>
          <th>Type</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
    `;

    data.forEach(order => {
  html += `
    <tr>
      <td>${order.OrderNumber}</td>
      <td>${order["Order Type"] || ""}</td>
      <td class="statusCell">${order.OrderStatus}</td>
      <td>

        ${
          order.OrderStatus === "Pending"
          ? `<button class="acceptBtn"
                data-order="${order.OrderNumber}"
                data-date="${order.Date}">
                Accept
             </button>`
          : ""
        }

        <button class="printBtn"
          onclick="generateBill('${order.OrderNumber}', '${order.Date}', this)">
          Generate Bill
        </button>

      </td>
    </tr>
  `;
});

    html += "</table>";
    placeholder.innerHTML = html;

    // 🔥 LAST UPDATED TIME
    if (lastUpdatedDiv) {
      const now = new Date();
      lastUpdatedDiv.textContent =
        "Last Updated: " + now.toLocaleTimeString();
    }

    // 🔥 ACCEPT BUTTON LISTENER
    document.querySelectorAll('.acceptBtn').forEach(btn => {
      btn.addEventListener('click', function() {

        const orderNumber = this.getAttribute('data-order');
        const orderDate = this.getAttribute('data-date');
        const statusCell = this.closest('tr').querySelector('.statusCell');

        this.disabled = true;
        this.textContent = 'Processing...';

        apiGet("acceptOrder", {
          orderNumber: orderNumber,
          orderDate: orderDate
        })
        .then(function(success){

          if (success) {
            statusCell.textContent = 'Accepted';
            btn.textContent = 'Accepted';
          } else {
            alert('Failed to update order status');
            btn.disabled = false;
            btn.textContent = 'Accept';
          }

        })
        .catch(function(err){
          console.error("acceptOrder error:", err);
          alert("Server error");
          btn.disabled = false;
          btn.textContent = 'Accept';
        });

      });
    });

  })
  .catch(function(err){
    console.error("Order load failed:", err);
    placeholder.textContent = "Server error loading orders.";
  });

}

function generateBill(orderNumber, orderDate, btnRef) {
      btnRef.textContent = 'Generating, please wait...';
      btnRef.disabled = true;
      btnRef.classList.add('processing');

      setTimeout(function() {
        apiGet("getOrderDetails", { 
  orderNumber: orderNumber,
  orderDate: orderDate
})
.then(function(order){
          if (!order) {
            alert('Order not found!');
            btnRef.textContent = 'Generate Bill';
            btnRef.disabled = false;
            btnRef.classList.remove('processing');
            return;
          }

          const items = (order['Items'] || '').toString().split(',');
          const qtys  = (order['Qty'] || '').toString().split(',');
          const rates = (order['Rate'] || '').toString().split(',');
          const amtList = items.map((_,i)=> (parseFloat(qtys[i])||0) * (parseFloat(rates[i])||0));
          let total = amtList.reduce((a,b)=>a+b,0);

          const colSNo = 4, colItem = 20, colQty = 4, colRate = 6, colAmt = 7;
          let billContent = '';
          for(let i=0;i<items.length;i++){
            billContent += String(i+1).padEnd(colSNo) + ' ' +
                           (items[i]||'').toString().padEnd(colItem) + ' ' +
                           (qtys[i]||'').toString().padEnd(colQty) + ' ' +
                           (rates[i]||'').toString().padEnd(colRate) + ' ' +
                           (amtList[i]||0).toFixed(2).padStart(colAmt) + '\n';
          }

          const totalLabel = 'Total:';
          const totalLine = ' '.repeat(colSNo + 1 + colItem + 1 + colQty + 1 + colRate - totalLabel.length)
                            + totalLabel + ' ' + total.toFixed(2).padStart(colAmt - 1);

          const billText = `
OrderNumber: ${order['OrderNumber']}
Customer Name: ${order['CustomerName']}
Email: ${order['Email']}
Mobile: ${order['Mobile']}
Order Type: ${order['Order Type']}
Address: ${order['Address']}

SNo  Item                 Qty  Rate     Amt
--------------------------------------------
${billContent}--------------------------------------------
${totalLine}
`;

          const preview = document.getElementById('thermalPreview');
          if (preview) { preview.textContent = billText; preview.style.display = 'block'; }

          document.querySelectorAll('.rowPrintBtn')?.forEach(b=>b.remove());

          const printBtn = document.createElement('button');
          printBtn.textContent = 'Print Bill';
          printBtn.className = 'rowPrintBtn printBtn';
          btnRef.parentNode.appendChild(printBtn);

          printBtn.onclick = function(){
            const w = window.open();
            w.document.write('<pre>'+billText+'</pre>');
            w.document.close();
            w.focus();
            w.print();
          };

          btnRef.textContent = 'Generate Bill';
          btnRef.disabled = false;
          btnRef.classList.remove('processing');

        }).catch(function(err){
  console.error('getOrderDetails error:', err);
  btnRef.textContent = 'Generate Bill';
  btnRef.disabled = false;
  btnRef.classList.remove('processing');
});
      }, 50);
}

    if (loadingBarEl) loadingBarEl.style.display = 'none';

  }

  // read inputs, apply defaults
  const yearFilter = filterYearEl.value;
  let view = viewSelectEl.value;
  if (!view) {
    console.log('loadSummary: no view selected -> defaulting to "table"');
    view = 'table';
    viewSelectEl.value = 'table';
  }
  const monthSelected = monthSelectEl ? monthSelectEl.value : '';

  console.log('loadSummary: resolved inputs -> year:', yearFilter, 'view:', view, 'month:', monthSelected);

  // basic validation
  if (!yearFilter) {
    summaryTableEl.innerHTML = 'Please select a year';
    if (loadingBarEl) loadingBarEl.style.display = 'none';
    return;
  }
  if ((view === 'pie' || view === 'histogram') && !monthSelected) {
    // user must select month for these views
    summaryTableEl.innerHTML = 'Please select a month for this view';
    if (loadingBarEl) loadingBarEl.style.display = 'none';
    return;
  }

  // call server
 
  // call server
apiGet("getSummaryData", { year: yearFilter })
  .then(function(data){
    try {

      if (loadingBarEl) loadingBarEl.style.display = 'none';

      if (!data || !Array.isArray(data) || data.length === 0) {
        summaryTableEl.innerHTML = 'No data found for the selected year';
        if (chartContainerEl) chartContainerEl.style.display = 'none';
        return;
      }

      // prepare month arrays
      const months = ['01','02','03','04','05','06','07','08','09','10','11','12'];
      const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

      // TABLE view
      if (view === 'table') {
        let html = '<table><tr><th class="sticky firstCol">Item</th>';
        monthNames.forEach(mn => html += `<th class="sticky">${mn}</th>`);
        html += '</tr>';
        data.forEach(itemObj => {
          html += `<tr><td class="firstCol">${itemObj.Item}</td>`;
          months.forEach(m => {
            const key = `${yearFilter}-${m}`;
            const qty = (itemObj.Months && itemObj.Months[key]) ? itemObj.Months[key] : 0;
            html += `<td>${qty}</td>`;
          });
          html += '</tr>';
        });
        summaryTableEl.innerHTML = html;
        if (summaryTableWrapper) summaryTableWrapper.style.display = 'block';
        if (chartContainerEl) chartContainerEl.style.display = 'none';
        if (window.chartInstance) { try{ window.chartInstance.destroy(); } catch(e){} window.chartInstance = null; }
        return;
      }

      // GRAPH (line) view
      if (view === 'graph') {
        const labels = monthNames;
        const datasets = data.map(itemObj => ({
          label: itemObj.Item,
          data: months.map(m => (itemObj.Months && itemObj.Months[`${yearFilter}-${m}`]) || 0),
          borderColor: getRandomColor(),
          backgroundColor: 'transparent',
          fill: false,
          tension: 0.1
        }));

        if (!summaryCanvas) {
          console.warn('loadSummary: summaryChart canvas not found');
          return;
        }

        const ctx = summaryCanvas.getContext('2d');
        if (window.chartInstance) { try{ window.chartInstance.destroy(); }catch(e){} }

        window.chartInstance = new Chart(ctx, {
          type: 'line',
          data: { labels, datasets },
          options: { 
            responsive: true, 
            plugins: { legend: { position: 'bottom' } }, 
            scales: { y: { beginAtZero: true } } 
          }
        });

        if (chartContainerEl) chartContainerEl.style.display = 'block';
        if (summaryTableWrapper) summaryTableWrapper.style.display = 'none';
        return;
      }

      // PIE or HISTOGRAM
      if (view === 'pie' || view === 'histogram') {

        const labels = [];
        const values = [];

        data.forEach(d => {
          const key = `${yearFilter}-${monthSelected}`;
          labels.push(d.Item);
          values.push((d.Months && d.Months[key]) ? d.Months[key] : 0);
        });

        if (!summaryCanvas) {
          console.warn('loadSummary: summaryChart canvas not found');
          return;
        }

        const ctx = summaryCanvas.getContext('2d');
        if (window.chartInstance) { try{ window.chartInstance.destroy(); }catch(e){} }

        if (view === 'pie') {

          window.chartInstance = new Chart(ctx, {
            type: 'pie',
            data: {
              labels,
              datasets: [{
                data: values,
                backgroundColor: labels.map((_, i) => getColor(i))
              }]
            },
            options: { responsive: true }
          });

        } else {

          const monthIndex = parseInt(monthSelected, 10) - 1;
          const monthLabel = (monthNames[monthIndex] || monthSelected);

          window.chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
              labels,
              datasets: [{
                label: `Qty (${monthLabel})`,
                data: values,
                backgroundColor: labels.map((_, i) => getColor(i))
              }]
            },
            options: { 
              responsive: true,
              plugins: { legend: { display: false } },
              scales: { y: { beginAtZero: true } }
            }
          });

        }

        if (chartContainerEl) chartContainerEl.style.display = 'block';
        if (summaryTableWrapper) summaryTableWrapper.style.display = 'none';
        return;
      }

      summaryTableEl.innerHTML = 'Unsupported view';

    } catch (err) {
      console.error('loadSummary: error processing server data', err);
      if (loadingBarEl) loadingBarEl.style.display = 'none';
      if (summaryTableEl) summaryTableEl.innerHTML = 'Error rendering summary.';
    }
  })
  .catch(function(err){
    console.error("getSummaryData API failed:", err);
    if (loadingBarEl) loadingBarEl.style.display = 'none';
    if (summaryTableEl) summaryTableEl.innerHTML = 'Server error loading summary';
  });
}

function cacheUrl(url) {
  if (!url) return url;
  // if url already has query params, add &v=..., else ?v=...
  return url + (url.indexOf('?') === -1 ? '?v=' + Date.now() : '&v=' + Date.now());
}

function uploadImage(inputEl, index) {

 if (index === 'new') {
    var row = document.getElementById('newRecordRow');
  } else {
    var row = document.getElementById(`row-${index}`);
  }
 //const row = document.getElementById(`row-${index}`);
  const span = document.getElementById(`img-url-${index}`);

  // 🚨 Lock row & show overlay
  row.dataset.uploading = "1";
  showUploadOverlay(row);

  const file = inputEl.files && inputEl.files[0];
  if (!file) {
    hideUploadOverlay(row);
    return alert("No file selected");
  }

  span.textContent = "Uploading...";
  span.removeAttribute("data-url");

  const reader = new FileReader();
  reader.onload = function (e) {
    try {
      const dataUrl = e.target.result;
      const base64 = dataUrl.split(",")[1];
      const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
      const filename = `menu_${Date.now()}.${ext}`;

      google.script.run
        .withSuccessHandler(function (url) {
          row.dataset.uploading = "0";
          hideUploadOverlay(row);

          span.setAttribute("data-url", url);
          span.dataset.url = url;
          span.textContent = "Uploaded";

          const imgInput = document.getElementById(`img-input-${index}`);
          if (imgInput) imgInput.value = url;

          const previewImg = document.querySelector(`#row-${index} td img`);
          if (previewImg) previewImg.src = url + "?v=" + Date.now();
           alert("Image upload completed successfully.\nPlease review the details and click \"Save\" to update the record.");

        })
        .withFailureHandler(function () {
          row.dataset.uploading = "0";
          hideUploadOverlay(row);
          span.textContent = "Upload failed";
          alert("Image upload failed.");
        })
        .uploadMenuImage(base64, filename);
    } catch (err) {
      row.dataset.uploading = "0";
      hideUploadOverlay(row);
      alert("File read error");
    }
  };

  reader.readAsDataURL(file);
}

  // 🔥 HIDE upload cell for this row
  const uploadCell = row.querySelector(".upload-cell");
  if (uploadCell) uploadCell.style.display = "none";

  // Restore original cells
  const originalValues = JSON.parse(row.dataset.original);
  const cells = row.querySelectorAll('td');
  originalValues.forEach((value, i) => {
    cells[i].innerHTML = value;
  });

  delete row.dataset.original;

  // ⭐ Re-enable Add New Record button (ONLY this)
  const addBtn = document.getElementById("addNewBtn");
  if (addBtn) addBtn.disabled = false;
}


function saveRow(index) {
  const row = document.getElementById(`row-${index}`);
  if (!row) return;

  if (row.dataset.uploading === "1") {
    alert("⏳ Image uploading...\nPlease wait until it finishes.");
    return;
  }

  showScreenLock("Saving record...");

  const cells = row.querySelectorAll("td");
  const inputs = row.querySelectorAll("input, button");
  inputs.forEach((el) => (el.disabled = true));

  const actionCell = cells[cells.length - 1];
  actionCell.innerHTML = `<span style="color:blue;">Saving...</span>`;

  const updatedData = {
    Name: cells[1].querySelector("input").value.trim(),
    Category: cells[2].querySelector("select").value.trim(),
    Description: cells[3].querySelector("input").value.trim(),
    Hold: document.getElementById(`hold-checkbox-${index}`).checked ? "TRUE" : "FALSE",

    Price: cells[5].querySelector("input").value.trim(),
    "Image Url": "",
    Hotselling: document.getElementById(`hotselling-checkbox-${index}`).checked ? "TRUE" : "FALSE",

    
    Opening: cells[8].querySelector("input").value.trim(),
  };

  const span = document.getElementById(`img-url-${index}`);
  let finalUrl = span && span.dataset.url ? span.dataset.url.trim() : "";

  if (!finalUrl) {
    const txt = document.getElementById(`img-input-${index}`);
    if (txt && txt.value.trim() !== "") finalUrl = txt.value.trim();
  }

  updatedData["Image Url"] = finalUrl;

  google.script.run
    .withSuccessHandler(() => {

      hideScreenLock();

      // 🔥 Enable ALL edit buttons after successful save
      document.querySelectorAll(".edit-btn").forEach(btn => btn.disabled = false);
      activeEditIndex = null;  // reset lock

      cells[6].innerHTML = finalUrl
        ? `<img src="${finalUrl}?v=${Date.now()}" style="width:80px;height:80px;object-fit:cover;">`
        : `<img src="https://via.placeholder.com/80x80?text=No+Image">`;

      cells[cells.length - 1].innerHTML =
        `<button class="edit-btn" data-index="${index}" onclick="editRow(${index})">✏️ Edit</button>`;

      // ⭐⭐⭐ MOVE HERE — Now reload after save completes ⭐⭐⭐
     setTimeout(() => {
  loadMenuData();
}, 500);

    })
    .withFailureHandler((err) => {
      hideScreenLock();
      alert("Error saving: " + err);
    })
    .updateMenuRecord(index, updatedData);
}


function addNewRecord() {
  const menuDiv = document.getElementById('menuTable');
  const existingForm = document.getElementById('newRecordRow');
  if (existingForm) return alert('🟡 New record form already open!');

  const table = menuDiv.querySelector('table');
  if (!table) return;

  let options = CATEGORY_OPTIONS
    .map(c => `<option value="${c}">${c}</option>`)
    .join("");

  const newRow = document.createElement('tr');
  newRow.id = 'newRecordRow';

  newRow.innerHTML = `
    <td>New</td>
    <td><input type="text" placeholder="Name"></td>

    <td>
      <select id="new-cat" style="width:100%">
        ${options}
      </select>
    </td>

    <td><input type="text" placeholder="Description"></td>
    <td><input type="text" placeholder="Hold"></td>
    <td><input type="text" placeholder="Price"></td>

    <td class="upload-cell">
      <input class="no-save" type="file" id="file-input-new" style="display:none"
        onchange="uploadImage(this, 'new')">

      <button type="button"
        onclick="document.getElementById('file-input-new').click()">
        Upload Image
      </button>

      <span id="img-url-new" style="font-size:12px;color:#007bff;margin-left:6px;"></span>

      <input type="text" placeholder="Image Url" id="img-input-new"
             style="width:100%;margin-top:4px;">
    </td>

    <td>
  <input type="checkbox" id="new-hotselling">
</td>

    <td><input type="text" placeholder="Opening"></td>

    <td>—</td><td>—</td><td>—</td>

    <td>
      <button onclick="saveNewRecord()">💾 Save</button>
      <button onclick="cancelNewRecord()">❌ Cancel</button>
    </td>
  `;

  table.appendChild(newRow);
  document.getElementById("addNewBtn").disabled = false;

}


function cancelNewRecord() {
  try {
    const row = document.getElementById('newRecordRow');
    if (row) row.remove();
  } catch (e) {
    console.warn("cancelNewRecord error:", e);
  }

  // Safely enable Add New button only if it exists
  const addBtn = document.getElementById("addNewBtn");
  if (addBtn) addBtn.disabled = false;
}

function saveNewRecord() {
  const row = document.getElementById('newRecordRow');
  if (!row) return;

  showScreenLock("Saving new record...");

  const newData = {
    Name: row.querySelector('td:nth-child(2) input').value.trim(),
    Category: document.getElementById("new-cat").value.trim(),
    Description: row.querySelector('td:nth-child(4) input').value.trim(),
    Hold: row.querySelector('td:nth-child(5) input').value.trim(),
    Price: row.querySelector('td:nth-child(6) input').value.trim(),
    "Image Url": row.querySelector('#img-input-new').value.trim(),
    Hotselling: document.getElementById("new-hotselling").checked ? "TRUE" : "FALSE",

    
    Opening: row.querySelector('td:nth-child(9) input').value.trim()
  };

  // Mandatory Name
  if (!newData.Name) {
    hideScreenLock();
    return alert("⚠️ Please enter a Name.");
  }

  // VALID Category
  if (!CATEGORY_OPTIONS.includes(newData.Category)) {
    hideScreenLock();
    return alert("⚠️ Invalid Category! Select only from dropdown.");
  }

  const span = document.getElementById('img-url-new');
  if (span?.dataset?.url) newData["Image Url"] = span.dataset.url.trim();

  google.script.run
    .withSuccessHandler(() => {
      hideScreenLock();
      alert("✅ New record added successfully!");
      loadMenuData();
    })
    .withFailureHandler((err) => {
      hideScreenLock();
      alert("Error saving new record: " + err);
    })
    .addMenuRecord(newData);
}



function showUploadOverlay(row) {
  let overlay = document.createElement("div");
  overlay.className = "upload-overlay";
  overlay.innerHTML = `<div class="upload-text">Uploading...</div>`;
  overlay.style.cssText = `
      position:absolute;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.4);
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      z-index:999;
  `;
  row.style.position = "relative";
  row.appendChild(overlay);
}

function hideUploadOverlay(row) {
  const overlay = row.querySelector(".upload-overlay");
  if (overlay) overlay.remove();
}

function showScreenLock(message = "Processing...") {
  let lock = document.getElementById("screen-lock");
  if (!lock) {
    lock = document.createElement("div");
    lock.id = "screen-lock";
    lock.style.cssText = `
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.5);
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      z-index: 999999;
    `;
    document.body.appendChild(lock);
  }
  lock.textContent = message;
  lock.style.display = "flex";
}

function hideScreenLock() {
  const lock = document.getElementById("screen-lock");
  if (lock) lock.style.display = "none";
}

function loadCategoryList() {
  apiGet("getCategoryList")
    .then(function(list) {
      const arr = list || [];
      window.CATEGORY_OPTIONS = arr;
      window.category_options = arr;
      refreshCategoryDropdown();
    })
    .catch(function(err) {
      console.error("Category load error:", err);
    });
}

function refreshCategoryDropdown() {
  const dl = document.getElementById("cat-list");
  if (!dl) return;

  // prefer uppercase var, fall back to lowercase alias
  const opts = (window.CATEGORY_OPTIONS && window.CATEGORY_OPTIONS.length) ? window.CATEGORY_OPTIONS
             : (window.category_options || []);

  dl.innerHTML = opts.map(cat => `<option value="${cat}">`).join("");
}

  <script>
document.addEventListener("DOMContentLoaded", function(){

  const fromInput = document.getElementById("fromDate");
  const toInput = document.getElementById("toDate");

  if (!fromInput || !toInput) return;

  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = ("0" + (today.getMonth()+1)).slice(-2);
  const dd = ("0" + today.getDate()).slice(-2);

  const todayStr = `${yyyy}-${mm}-${dd}`;
  fromInput.value = todayStr;

  const nextDay = new Date(today);
  nextDay.setDate(nextDay.getDate() + 1);

  const toStr =
    nextDay.getFullYear() + "-" +
    ("0"+(nextDay.getMonth()+1)).slice(-2) + "-" +
    ("0"+nextDay.getDate()).slice(-2);

  toInput.value = toStr;

  fromInput.addEventListener("change", function(){
    const selected = new Date(this.value);
    const autoNext = new Date(selected);
    autoNext.setDate(autoNext.getDate() + 1);

    toInput.value =
      autoNext.getFullYear() + "-" +
      ("0"+(autoNext.getMonth()+1)).slice(-2) + "-" +
      ("0"+autoNext.getDate()).slice(-2);
  });

  toInput.addEventListener("change", function(){
    const fromDate = new Date(fromInput.value);
    const toDate = new Date(toInput.value);

    if (toDate < fromDate) {
      alert("To Date cannot be less than From Date");
      toInput.value = fromInput.value;
    }
  });

});
</script>
